<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveTechify - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Navbar Styles */
        nav {
            background-color: #2c3e50;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-left h1 {
            color: #3498db;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-right a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
        }

        .nav-right a:hover {
            color: #3498db;
        }

        .nav-right .login-btn {
            background-color: #3498db;
            color: white !important;
            padding: 0.6rem 1.5rem;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .nav-right .login-btn:hover {
            background-color: #2980b9;
            color: white !important;
        }

        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 100px 2rem;
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .welcome-section h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .welcome-section p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .welcome-section .cta-btn {
            background-color: #fff;
            color: #667eea;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .welcome-section .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-left, .nav-right {
                width: 100%;
                justify-content: center;
            }

            .nav-right {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .welcome-section h2 {
                font-size: 2rem;
            }

            .welcome-section p {
                font-size: 1.2rem;
            }

            .welcome-section {
                padding: 50px 1rem;
            }
        }

        @media (max-width: 480px) {
            .nav-left h1 {
                font-size: 1.3rem;
            }

            .nav-right {
                gap: 0.5rem;
            }

            .nav-right a {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }

            .welcome-section h2 {
                font-size: 1.5rem;
            }

            .welcome-section p {
                font-size: 1rem;
            }

            .welcome-section .cta-btn {
                padding: 0.8rem 2rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="nav-left">
            <img src="https://www.wavetechify.in/images/wavetechify-dark.png" alt="">
        </div>
        <div class="nav-right">
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="#login" class="login-btn">Log In</a>
        </div>
    </nav>

    <!-- Welcome Section -->
    <section class="welcome-section">
        <h2>Welcome to WaveTechify</h2>
        <p>How may I help you?</p>
        <button class="cta-btn"><a href="https://wavetechify.in/" target="_blank">Get Started</a></button>
    </section>
</body>
</html>
